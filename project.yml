name: MiniIDE
options:
  bundleIdPrefix: com.kameronpence
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"

targets:
  MiniIDE:
    type: application
    platform: macOS
    sources:
      - path: MiniIDE
    dependencies:
      - package: SwiftTerm
    info:
      path: MiniIDE/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: AronnaxIDE
        CFBundleName: AronnaxIDE
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: ""
        # The Browser pane loads the mini's localhost dev servers over http via
        # forwarded loopback IPs (127.0.0.1:<port>). ATS's NSAllowsLocalNetworking
        # does NOT cover raw IP literals, so WKWebView would block them (works in
        # Chrome, blank in-app). This is a personal, locally-run dev tool, so disable
        # ATS outright — the same posture as the no-sandbox / no-hardened-runtime.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kameronpence.MiniIDE
        PRODUCT_NAME: MiniIDE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Personal tool, run locally: no App Sandbox (we shell out to /usr/bin/ssh)
        # and no Hardened Runtime so WKWebView + Process work without extra setup.
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"
