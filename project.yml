name: AronnaxIDE
options:
  bundleIdPrefix: com.kameronpence
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  Citadel:
    path: ThirdParty/Citadel

targets:
  AronnaxIDE:
    type: application
    platform: macOS
    scheme:
      testTargets:
        - AronnaxIDEUITests
    sources:
      - path: AronnaxIDE
    dependencies:
      - package: SwiftTerm
    info:
      path: AronnaxIDE/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: AronnaxIDE
        CFBundleName: AronnaxIDE
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: ""
        # macOS Dictation runs on-device in the app's process and needs microphone access
        # (TCC), which is gated by this usage string. Without it macOS silently refuses to
        # start Dictation in the app — the fix for "dictation won't start here but works
        # elsewhere". Non-sandboxed + non-hardened, so the string alone is enough (no entitlement).
        NSMicrophoneUsageDescription: "AronnaxIDE uses the microphone for macOS Dictation when typing into the terminal and coding panes."
        # The Browser pane loads the mini's localhost dev servers over http via
        # forwarded loopback IPs (127.0.0.1:<port>). ATS's NSAllowsLocalNetworking
        # does NOT cover raw IP literals, so WKWebView would block them (works in
        # Chrome, blank in-app). This is a personal, locally-run dev tool, so disable
        # ATS outright — the same posture as the no-sandbox / no-hardened-runtime.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kameronpence.AronnaxIDE
        PRODUCT_NAME: AronnaxIDE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Personal tool, run locally: no App Sandbox (we shell out to /usr/bin/ssh)
        # and no Hardened Runtime so WKWebView + Process work without extra setup.
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.0"

  # Probe/verification UI-test target for the macOS app (lets me drive the app on kepler
  # via XCUITest, which has automation privileges a plain SSH launch lacks).
  AronnaxIDEUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: AronnaxIDEUITests
    dependencies:
      - target: AronnaxIDE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kameronpence.AronnaxIDEUITests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"
        # Ad-hoc sign (like the app) so the test runner builds over SSH without a locked
        # keychain / Developer identity.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"

  # iOS companion — Terminal + Coding only, over Citadel (pure-Swift SSH) to kepler
  # via Tailscale. iOS can't shell out to /usr/bin/ssh, so transport differs from the
  # macOS target; UI is iOS-native. Shared logic gets factored out as milestones land.
  AronnaxIOS:
    type: application
    platform: iOS
    scheme: {}
    sources:
      - path: AronnaxIOS
    dependencies:
      - package: SwiftTerm
      - package: Citadel
    info:
      path: AronnaxIOS/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Aronnax
        CFBundleName: Aronnax
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kameronpence.AronnaxIOS
        PRODUCT_NAME: Aronnax
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 46W4LYLT6R
        # Xcode-beta's explicit-modules scanner can't resolve swift-nio's
        # DequeModule/Atomics deps; disable it so swift-nio compiles.
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
        # Ship a single binary instead of Xcode's Debug "debug dylib" split. On device the
        # separate Aronnax.debug.dylib must be signed/loaded, and when it doesn't the app
        # stub launches to a blank screen (works in the Simulator, which needs no signing).
        ENABLE_DEBUG_DYLIB: "NO"

  # iPad app — the desktop-style multi-pane workspace (recursive splits) over Citadel to
  # kepler via Tailscale. Self-contained: its own copy of the transport/terminal code, so
  # the phone (AronnaxIOS) is untouched. v1 surfaces are Terminal + Coding only.
  AronnaxIPad:
    type: application
    platform: iOS
    scheme: {}
    sources:
      - path: AronnaxIPad
    dependencies:
      - package: SwiftTerm
      - package: Citadel
    info:
      path: AronnaxIPad/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: AronnaxIPad
        CFBundleName: AronnaxIPad
        UILaunchScreen: {}
        # NO UIRequiresFullScreen -> Split View / Stage Manager multitasking works.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kameronpence.AronnaxIPad
        PRODUCT_NAME: AronnaxIPad
        TARGETED_DEVICE_FAMILY: "2"          # iPad only
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 46W4LYLT6R
        # Same swift-nio explicit-modules + debug-dylib workarounds as the iOS target.
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
